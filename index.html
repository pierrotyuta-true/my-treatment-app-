<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuta's Story Note</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>Story List</h3>
                <button class="new-btn" onclick="createNewStory()">+ New</button>
            </div>
            <ul id="story-list" class="story-list"></ul>
        </aside>

        <main id="main-container">
            <header>
                <div class="header-left">
                    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
                    <strong id="current-title">메인 줄거리</strong>
                </div>
                <div class="header-actions">
                    <button id="sub-doc-btn" onclick="makeSubDocument()">파트 분리</button>
                    <button id="edit-btn" onclick="handleEdit()">편집 시작</button>
                </div>
            </header>

            <section id="content-wrapper">
                <div class="paper">
                    <div id="viewer"></div>
                    <textarea id="editor" placeholder="줄거리를 쓰세요... ==강조== 로 형광펜을 칠할 수 있습니다."></textarea>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
